<header><h1>Haitian Players</h1><div class="sub">1 players</div><div class="breadcrumb"><a href="index.html">Home</a> › <a href="index.html">Nationalities</a> › Haitian</div></header>
<main><p class="muted">1 players across 1 leagues</p>
        <div class="filter-bar"><input data-filter="nat-haitian" placeholder="Filter…"></div>
        <table id="nat-haitian"><thead><tr><th data-sort>Player</th><th data-sort>Club</th><th data-sort>League</th><th data-sort>Pos</th><th class="num" data-sort>Rating</th></tr></thead>
        <tbody><tr>
              <td><a href="../teams/nancy.html#wagneau-eloi">Wagneau Eloi</a></td>
              <td><a href="../teams/nancy.html">Nancy</a></td>
              <td><a href="../leagues/french-division-1.html">French Division 1</a></td>
              <td><a href="../positions/fwd.html" class="pos">FWD</a></td>
              <td class="num"><span class="rat-gold">70.3</span></td>
            </tr></tbody></table></main>
<footer>FIFA Soccer Manager 97 · Data extracted from SM97.DAT</footer>
<script>
document.querySelectorAll('input[data-filter]').forEach(function(inp){
  var tbl = document.getElementById(inp.dataset.filter);
  inp.addEventListener('input', function(){
    var q = this.value.toLowerCase();
    tbl.querySelectorAll('tbody tr').forEach(function(tr){
      tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  });
});
document.querySelectorAll('thead th[data-sort]').forEach(function(th){
  var asc = true;
  th.addEventListener('click', function(){
    var tbl = th.closest('table');
    var idx = Array.from(th.parentElement.children).indexOf(th);
    var rows = Array.from(tbl.tBodies[0].querySelectorAll('tr'));
    rows.sort(function(a,b){
      var ac = a.cells[idx], bc = b.cells[idx];
      var av = ac ? ac.textContent.trim() : '';
      var bv = bc ? bc.textContent.trim() : '';
      var an = parseFloat(av.replace(/[^0-9.-]/g,'')),
          bn = parseFloat(bv.replace(/[^0-9.-]/g,''));
      if(!isNaN(an)&&!isNaN(bn)) return asc ? an-bn : bn-an;
      return asc ? av.localeCompare(bv) : bv.localeCompare(av);
    });
    rows.forEach(function(r){ tbl.tBodies[0].appendChild(r); });
    tbl.querySelectorAll('thead th[data-sort]').forEach(function(t){
      t.classList.remove('sort-asc','sort-desc');
    });
    th.classList.add(asc ? 'sort-asc' : 'sort-desc');
    asc = !asc;
  });
});
</script>
</body>
